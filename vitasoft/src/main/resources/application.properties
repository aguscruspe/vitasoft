# ========================
# Server
# ========================
server.port=8080

# ========================
# MySQL DataSource
# ========================
spring.datasource.url=jdbc:mysql://localhost:3306/vitasoft_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ========================
# JPA / Hibernate
# ========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ========================
# JWT
# ========================
app.jwt.secret=clave-secreta-vitasoft-cambiar-en-produccion-min-256-bits-requeridos
app.jwt.expiration-ms=86400000

# ========================
# Archivos generados
# ========================
app.archivos.ruta-base=./archivos-generados

# ========================
# Multipart (upload Excel)
# ========================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
